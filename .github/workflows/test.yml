name: Django CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd sarcasm_detect
          pip install -r requirements.txt
      - name: Run migrations
        run: |
          cd sarcasm_detect
          python manage.py migrate
      - name: Health check
        run: |
          cd sarcasm_detect
          python manage.py check
