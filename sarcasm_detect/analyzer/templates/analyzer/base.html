<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SarcasmAI - Advanced multimodal AI system for detecting sarcasm in text, emojis, and images">
  <title>{% block title %}SarcasmAI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'analyzer/css/styles.css' %}?v=2">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'index' %}">
      <i class="fa-solid fa-masks-theater text-warning"></i>
      <span>Sarcasm<span class="text-warning">AI</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link px-3" href="{% url 'index' %}">
            <i class="fa fa-home me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="{% url 'analyze' %}">
            <i class="fa fa-bolt me-1"></i>Analyze
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" href="{% url 'history' %}">
            <i class="fa fa-clock-rotate-left me-1"></i>History
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container mt-5 pt-5">
  {% block content %}{% endblock %}
</main>

<footer class="mt-5 py-4 text-center text-muted small">
  <div class="container">
    <p class="mb-1">
      <span class="text-warning fw-medium">SarcasmAI</span> &mdash; 
      Hybrid Multimodal Sarcasm Detection
    </p>
    <p class="mb-2">
      Built with 
      <i class="fab fa-python text-info"></i> Django + 
      <i class="fa fa-fire text-warning"></i> PyTorch + 
      🤗 Transformers
    </p>
    <p class="mb-0 text-muted" style="font-size:0.75rem;">
      Final Year Project &mdash; 2026
    </p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
